<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Multi-Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #2a2a2a;
      border-right: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #3a3a3a;
    }

    .new-chat-btn {
      width: 100%;
      padding: 12px 20px;
      background: #4a4a4a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .new-chat-btn:hover {
      background: #5a5a5a;
    }

    .directory-picker {
      padding: 12px 0;
      margin-top: 8px;
      display: none;
    }

    .directory-picker.visible {
      display: block;
    }

    .directory-input {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .directory-actions {
      display: flex;
      gap: 8px;
    }

    .dir-action-btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .dir-confirm-btn {
      background: #10b981;
      color: white;
    }

    .dir-confirm-btn:hover {
      background: #059669;
    }

    .dir-cancel-btn {
      background: #4a4a4a;
      color: white;
    }

    .dir-cancel-btn:hover {
      background: #5a5a5a;
    }

    .conversation-dir {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .conversation-item {
      padding: 12px 16px;
      margin-bottom: 6px;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .conversation-item:hover {
      background: #3a3a3a;
    }

    .conversation-item.active {
      background: #4a4a4a;
      border-left: 3px solid #7c3aed;
    }

    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .conversation-id {
      font-size: 12px;
      color: #999;
      font-family: monospace;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-indicator.running {
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .conversation-preview {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .conversation-item:hover .delete-btn {
      opacity: 1;
    }

    /* Main content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .view-toggle {
      padding: 16px 24px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      display: flex;
      gap: 12px;
    }

    .view-btn {
      padding: 8px 16px;
      background: #3a3a3a;
      color: #aaa;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-btn.active {
      background: #7c3aed;
      color: white;
    }

    /* Gallery view */
    .gallery-view {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      align-content: start;
    }

    .gallery-view.hidden {
      display: none;
    }

    .gallery-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      border: 1px solid #3a3a3a;
      cursor: pointer;
      transition: all 0.2s;
    }

    .gallery-card:hover {
      border-color: #7c3aed;
      transform: translateY(-2px);
    }

    .gallery-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .gallery-card-id {
      font-size: 13px;
      color: #999;
      font-family: monospace;
    }

    .gallery-messages {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .gallery-message {
      padding: 8px 12px;
      margin-bottom: 8px;
      background: #333;
      border-radius: 6px;
      font-size: 13px;
    }

    .gallery-message.user {
      background: #3a3a5a;
    }

    /* Chat view */
    .chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-view.hidden {
      display: none;
    }

    .chat-header {
      padding: 16px 24px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-size: 14px;
      color: #999;
      font-family: monospace;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .message {
      margin-bottom: 20px;
      max-width: 800px;
    }

    .message.user {
      margin-left: auto;
    }

    .message-role {
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .message-role.user {
      color: #859900;
    }

    .message-role.assistant {
      color: #268bd2;
    }

    .message-content {
      padding: 12px 16px;
      border-radius: 8px;
      background: #2a2a2a;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      color: #93a1a1;
    }

    .message.user .message-content {
      background: #2a3a2a;
      border-left: 3px solid #859900;
    }

    .message.assistant .message-content {
      background: #2a2a3a;
      border-left: 3px solid #268bd2;
    }

    .input-container {
      padding: 20px 24px;
      background: #2a2a2a;
      border-top: 1px solid #3a3a3a;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 200px;
    }

    .message-input:focus {
      outline: none;
      border-color: #7c3aed;
    }

    .send-btn {
      padding: 12px 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .send-btn:hover {
      background: #6d28d9;
    }

    .send-btn:disabled {
      background: #4a4a4a;
      cursor: not-allowed;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #4a4a4a;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5a5a5a;
    }

    /* Parser colors - Solarized Dark */
    .color-blue { color: #268bd2; }
    .color-cyan { color: #2aa198; }
    .color-green { color: #859900; }
    .color-yellow { color: #b58900; }
    .color-orange { color: #cb4b16; }
    .color-base1 { color: #93a1a1; }

    /* Tool call styling */
    .tool-call {
      display: inline-block;
      padding: 4px 8px;
      background: #2a2a2a;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      margin: 2px 0;
      border-left: 3px solid #268bd2;
    }

    .emoji {
      margin-right: 4px;
    }

    .message-user,
    .message-assistant {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 6px;
      word-wrap: break-word;
    }

    .message-user {
      background: #2a3a2a;
      border-left: 3px solid #859900;
    }

    .message-assistant {
      background: #2a2a3a;
      border-left: 3px solid #268bd2;
    }

    .role {
      font-weight: bold;
      color: #b58900;
      margin-right: 8px;
    }
  </style>
  <script src="parser.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="app.createNewConversation()">
          <span>+</span>
          <span>New Conversation</span>
        </button>
        <div class="directory-picker" id="directoryPicker">
          <input
            type="text"
            class="directory-input"
            id="directoryInput"
            placeholder="/path/to/directory"
          />
          <div class="directory-actions">
            <button class="dir-action-btn dir-confirm-btn" onclick="app.confirmNewConversation()">✓</button>
            <button class="dir-action-btn dir-cancel-btn" onclick="app.cancelNewConversation()">✕</button>
          </div>
        </div>
      </div>
      <div class="conversations-list" id="conversationsList"></div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="view-toggle">
        <button class="view-btn active" onclick="app.setView('gallery')">Gallery</button>
        <button class="view-btn" onclick="app.setView('chat')">Chat</button>
      </div>

      <!-- Gallery view -->
      <div class="gallery-view" id="galleryView"></div>

      <!-- Chat view -->
      <div class="chat-view hidden" id="chatView">
        <div class="chat-header">
          <div class="chat-title" id="chatTitle">No conversation selected</div>
        </div>
        <div class="messages-container" id="messagesContainer">
          <div class="empty-state">Select a conversation to start chatting</div>
        </div>
        <div class="input-container">
          <div class="input-wrapper">
            <textarea 
              class="message-input" 
              id="messageInput" 
              placeholder="Type your message..."
              onkeydown="app.handleInputKeydown(event)"
            ></textarea>
            <button class="send-btn" onclick="app.sendMessage()" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    class ChatApp {
      constructor() {
        this.ws = null;
        this.conversations = new Map();
        this.activeConversationId = null;
        this.currentView = 'gallery';
        this.currentAssistantMessage = '';
        this.defaultCwd = null;
        this.directoryPicker = document.getElementById('directoryPicker');
        this.directoryInput = document.getElementById('directoryInput');
        this.connect();
      }

      connect() {
        this.ws = new WebSocket(`ws://${window.location.host}`);

        this.ws.onopen = () => {
          console.log('Connected to server');
        };

        this.ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          this.handleServerMessage(data);
        };

        this.ws.onclose = () => {
          console.log('Disconnected from server');
          setTimeout(() => this.connect(), 2000);
        };
      }

      handleServerMessage(data) {
        switch (data.type) {
          case 'init':
            this.defaultCwd = data.defaultCwd;
            data.conversations.forEach(conv => {
              this.conversations.set(conv.id, conv);
            });
            this.renderConversationsList();
            this.renderGallery();
            break;

          case 'error':
            alert(data.message);
            this.directoryPicker.classList.add('visible');
            break;

          case 'conversation_created':
            this.conversations.set(data.conversation.id, data.conversation);
            this.renderConversationsList();
            this.renderGallery();
            this.selectConversation(data.conversation.id);
            this.setView('chat');
            break;

          case 'message':
            this.addMessage(data.conversationId, data.role, data.content);
            break;

          case 'chunk':
            this.appendChunk(data.conversationId, data.text);
            break;

          case 'message_complete':
            this.completeAssistantMessage(data.conversationId);
            break;

          case 'status':
            const conv = this.conversations.get(data.conversationId);
            if (conv) {
              conv.isRunning = data.isRunning;
              this.renderConversationsList();
            }
            break;

          case 'conversation_deleted':
            this.conversations.delete(data.conversationId);
            if (this.activeConversationId === data.conversationId) {
              this.activeConversationId = null;
            }
            this.renderConversationsList();
            this.renderGallery();
            this.renderChat();
            break;
        }
      }

      createNewConversation() {
        // Get last used or default directory
        const lastDir = localStorage.getItem('claudeWorkingDirectory') || this.defaultCwd;
        this.directoryInput.value = lastDir;
        this.directoryPicker.classList.add('visible');
        this.directoryInput.focus();
      }

      confirmNewConversation() {
        const workingDirectory = this.directoryInput.value.trim();
        if (workingDirectory) {
          localStorage.setItem('claudeWorkingDirectory', workingDirectory);
        }

        this.ws.send(JSON.stringify({
          type: 'new_conversation',
          workingDirectory: workingDirectory
        }));

        this.directoryPicker.classList.remove('visible');
      }

      cancelNewConversation() {
        this.directoryPicker.classList.remove('visible');
      }

      selectConversation(id) {
        this.activeConversationId = id;
        this.renderConversationsList();
        this.renderChat();
      }

      setView(view) {
        this.currentView = view;

        // Update button states
        const btns = document.querySelectorAll('.view-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        if (view === 'gallery') {
          btns[0]?.classList.add('active');
          document.getElementById('galleryView').classList.remove('hidden');
          document.getElementById('chatView').classList.add('hidden');
        } else {
          btns[1]?.classList.add('active');
          document.getElementById('galleryView').classList.add('hidden');
          document.getElementById('chatView').classList.remove('hidden');
        }
      }

      sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        
        if (!content || !this.activeConversationId) return;

        this.ws.send(JSON.stringify({
          type: 'send_message',
          conversationId: this.activeConversationId,
          content: content
        }));

        input.value = '';
        input.style.height = 'auto';
      }

      handleInputKeydown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          this.sendMessage();
        }
      }

      addMessage(conversationId, role, content) {
        const conv = this.conversations.get(conversationId);
        if (!conv) return;

        if (role === 'assistant') {
          // Start a new assistant message
          conv.messages.push({
            role: 'assistant',
            content: '',
            timestamp: new Date()
          });
        }

        if (conversationId === this.activeConversationId) {
          this.renderChat();
        }
        this.renderGallery();
      }

      appendChunk(conversationId, text) {
        const conv = this.conversations.get(conversationId);
        if (!conv) return;

        // Append to the last message (should be assistant)
        const lastMessage = conv.messages[conv.messages.length - 1];
        if (lastMessage && lastMessage.role === 'assistant') {
          lastMessage.content += text;
        }

        if (conversationId === this.activeConversationId) {
          this.renderChat();
          this.scrollToBottom();
        }
      }

      completeAssistantMessage(conversationId) {
        this.renderGallery();
      }

      deleteConversation(id, event) {
        event.stopPropagation();
        if (confirm('Delete this conversation?')) {
          this.ws.send(JSON.stringify({
            type: 'delete_conversation',
            conversationId: id
          }));
        }
      }

      renderConversationsList() {
        const list = document.getElementById('conversationsList');
        list.innerHTML = '';

        this.conversations.forEach(conv => {
          const item = document.createElement('div');
          item.className = 'conversation-item' + 
            (conv.id === this.activeConversationId ? ' active' : '');
          item.onclick = () => {
            this.selectConversation(conv.id);
            this.setView('chat');
          };

          const preview = conv.messages.length > 0
            ? conv.messages[conv.messages.length - 1].content.substring(0, 50) + '...'
            : 'New conversation';

          const dirDisplay = conv.workingDirectory.replace(/^\/Users\/[^\/]+/, '~');

          item.innerHTML = `
            <div class="conversation-header">
              <div class="conversation-id">${conv.id.substring(0, 8)}</div>
              <div class="status-indicator ${conv.isRunning ? 'running' : ''}"></div>
            </div>
            <div class="conversation-preview">${preview}</div>
            <div class="conversation-dir">${dirDisplay}</div>
            <button class="delete-btn" onclick="app.deleteConversation('${conv.id}', event)">Delete</button>
          `;

          list.appendChild(item);
        });
      }

      renderGallery() {
        const gallery = document.getElementById('galleryView');
        gallery.innerHTML = '';

        if (this.conversations.size === 0) {
          gallery.innerHTML = '<div class="empty-state">No conversations yet. Click "+ New Conversation" to start.</div>';
          return;
        }

        this.conversations.forEach(conv => {
          const card = document.createElement('div');
          card.className = 'gallery-card';
          card.onclick = () => {
            this.selectConversation(conv.id);
            this.setView('chat');
          };

          let messagesHTML = '';
          conv.messages.forEach(msg => {
            const preview = msg.content.substring(0, 100);
            messagesHTML += `
              <div class="gallery-message ${msg.role}">
                <strong>${msg.role}:</strong> ${preview}${msg.content.length > 100 ? '...' : ''}
              </div>
            `;
          });

          card.innerHTML = `
            <div class="gallery-card-header">
              <div class="gallery-card-id">${conv.id.substring(0, 8)}</div>
              <div class="status-indicator ${conv.isRunning ? 'running' : ''}"></div>
            </div>
            <div>${conv.messages.length} messages</div>
            <div class="gallery-messages">${messagesHTML || '<div class="empty-state">No messages yet</div>'}</div>
          `;

          gallery.appendChild(card);
        });
      }

      renderChat() {
        const container = document.getElementById('messagesContainer');
        const title = document.getElementById('chatTitle');

        if (!this.activeConversationId) {
          container.innerHTML = '<div class="empty-state">Select a conversation to start chatting</div>';
          title.textContent = 'No conversation selected';
          return;
        }

        const conv = this.conversations.get(this.activeConversationId);
        if (!conv) return;

        const dirDisplay = conv.workingDirectory.replace(/^\/Users\/[^\/]+/, '~');
        title.innerHTML = `<span style="font-size: 12px; color: #666;">${conv.id.substring(0, 8)}</span> • <span style="font-size: 11px; color: #666; font-family: monospace;">${dirDisplay}</span>`;

        if (conv.messages.length === 0) {
          container.innerHTML = '<div class="empty-state">Send a message to start the conversation</div>';
          return;
        }

        container.innerHTML = '';
        conv.messages.forEach(msg => {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${msg.role}`;
          const content = StreamParser.escapeHtml(msg.content || '...');
          messageDiv.innerHTML = `
            <div class="message-role ${msg.role === 'user' ? 'user' : 'assistant'}">${msg.role}</div>
            <div class="message-content">${content}</div>
          `;
          container.appendChild(messageDiv);
        });
      }

      scrollToBottom() {
        const container = document.getElementById('messagesContainer');
        container.scrollTop = container.scrollHeight;
      }
    }

    const app = new ChatApp();
  </script>
</body>
</html>
